# Kite Ground Control — Release build (manual)
#
# Manually triggered only (Actions tab -> "Release build" -> Run workflow, or
# `gh workflow run release.yml`). Builds the distributable artifacts on a pinned,
# broadly-compatible base and uploads them as downloadable workflow artifacts —
# download them from the run and attach them to a GitHub release by hand.
#
# Deliberately NOT triggered on push/tags: releases are cut on demand, not per commit.
#
# Linux is built on ubuntu-22.04 on purpose: its glibc / GTK / libgcrypt are old
# enough that the bundled libraries (esp. the AppImage) run on 22.04, 24.04, Debian
# 12/13 and newer. Building on a newer base (e.g. Debian 13) over-bundles newer libs
# and breaks on older targets (e.g. the libgcrypt/libgpg-error symbol mismatch).

name: Release build

on:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  windows:
    name: Build (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Build Tauri bundle
        run: npm run tauri build
      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v5
        with:
          name: kite-gc-windows
          if-no-files-found: error
          path: |
            src-tauri/target/release/kite-gc.exe
            src-tauri/target/release/bundle/nsis/*-setup.exe

  linux:
    name: Build (Linux · ubuntu-22.04)
    runs-on: ubuntu-22.04
    env:
      # Let appimagetool run without FUSE on the CI runner.
      APPIMAGE_EXTRACT_AND_RUN: 1
    steps:
      - uses: actions/checkout@v5
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libudev-dev \
            patchelf \
            file \
            libfuse2 \
            xdg-utils
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Build Tauri bundle
        run: npm run tauri build
      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v5
        with:
          name: kite-gc-linux
          if-no-files-found: error
          path: |
            src-tauri/target/release/kite-gc
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/rpm/*.rpm
            src-tauri/target/release/bundle/appimage/*.AppImage

  # Native aarch64 build on GitHub's ARM64 Linux runner (free for public repos) — no cross-compile, so
  # the Pi 5 (and other arm64 Linux) gets a ready binary/.deb/.AppImage without a local build env. Same
  # ubuntu-22.04 base as the x86 Linux job (old enough glibc/GTK so we don't force users to upgrade).
  linux-arm64:
    name: Build (Linux ARM64 · ubuntu-22.04-arm)
    runs-on: ubuntu-22.04-arm
    env:
      # Let appimagetool run without FUSE on the CI runner.
      APPIMAGE_EXTRACT_AND_RUN: 1
    steps:
      - uses: actions/checkout@v5
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libudev-dev \
            patchelf \
            file \
            libfuse2 \
            xdg-utils
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Build Tauri bundle
        run: npm run tauri build
      - name: Upload Linux ARM64 artifacts
        uses: actions/upload-artifact@v5
        with:
          name: kite-gc-linux-arm64
          if-no-files-found: error
          path: |
            src-tauri/target/release/kite-gc
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/rpm/*.rpm
            src-tauri/target/release/bundle/appimage/*.AppImage
