# Kite Ground Control - Release Build
#
# Runs when a tag matching v* is pushed (e.g. v0.1.0, v0.2.0).
# Builds platform-specific bundles and uploads them as release artefacts.
#
# Windows: NSIS installer (.exe)
# Linux:   .deb package

name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: KiteGC-Setup-x64.exe
            artifact_path: src-tauri/target/release/bundle/nsis/Kite\ Ground\ Control_*_x64-setup.exe
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: kite-gc_amd64.deb
            artifact_path: src-tauri/target/release/bundle/deb/kite-gc_*.deb

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # --- Linux system dependencies ---
      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libudev-dev \
            patchelf

      # --- Frontend ---
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      # --- Backend ---
      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Build Tauri bundle (${{ matrix.os }})
        run: npm run tauri build

      - name: Upload artefact to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.artifact_path }}
          generate_release_notes: true
